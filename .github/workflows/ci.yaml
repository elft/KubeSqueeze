name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  go:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Formatting
        run: test -z "$(gofmt -l .)"
      - name: Vet
        run: go vet ./...
      - name: Unit and race tests
        run: go test -race ./...
      - name: Build
        run: make build

  e2e:
    name: e2e (${{ matrix.kubernetes }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - kubernetes: "1.20.15"
            kind: "v0.17.0"
            kubectl: "v1.20.15"
            node: "kindest/node:v1.20.15@sha256:a32bf55309294120616886b5338f95dd98a2f7231519c7dedcec32ba29699394"
          - kubernetes: "1.35.0"
            kind: "v0.31.0"
            kubectl: "v1.35.0"
            node: "kindest/node:v1.35.0@sha256:452d707d4862f52530247495d180205e029056831160e22870e37e3f6c1ac31f"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Install pinned kind and kubectl
        env:
          KIND_VERSION: ${{ matrix.kind }}
          KUBECTL_VERSION: ${{ matrix.kubectl }}
        run: |
          set -euo pipefail
          curl --fail --location --silent --show-error \
            --output kind "https://kind.sigs.k8s.io/dl/${KIND_VERSION}/kind-linux-amd64"
          curl --fail --location --silent --show-error \
            --output kubectl "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl"
          sudo install -m 0755 kind kubectl /usr/local/bin/
          kind version
          kubectl version --client=true
      - name: Build
        run: make build
      - name: Run exact-output integration test
        env:
          KIND_NODE_IMAGE: ${{ matrix.node }}
          KUBESQUEEZE_BIN: ${{ github.workspace }}/bin/kubesqueeze
        run: test/e2e/run.sh
