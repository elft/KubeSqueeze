name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Validate release tag
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tags must use semantic versioning (for example, v0.1.0)." >&2
            exit 1
          fi
      - name: Test
        run: make check

  build-binaries:
    needs: test
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            asset: kubesqueeze_linux_amd64.tar.gz
          - goos: linux
            goarch: arm64
            asset: kubesqueeze_linux_arm64.tar.gz
          - goos: darwin
            goarch: amd64
            asset: kubesqueeze_darwin_amd64.tar.gz
          - goos: darwin
            goarch: arm64
            asset: kubesqueeze_darwin_arm64.tar.gz
          - goos: windows
            goarch: amd64
            asset: kubesqueeze_windows_amd64.zip
          - goos: windows
            goarch: arm64
            asset: kubesqueeze_windows_arm64.zip
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Build and package
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ github.ref_name }}
          ASSET: ${{ matrix.asset }}
        run: |
          set -euo pipefail
          mkdir -p dist/package
          binary=kubesqueeze
          if [[ "$GOOS" == windows ]]; then
            binary=kubesqueeze.exe
          fi
          CGO_ENABLED=0 go build \
            -trimpath \
            -ldflags="-s -w -X main.version=${VERSION}" \
            -o "dist/package/${binary}" \
            ./cmd/kubesqueeze
          if [[ "$ASSET" == *.zip ]]; then
            (cd dist/package && zip -q "../${ASSET}" "$binary")
          else
            tar -C dist/package -czf "dist/${ASSET}" "$binary"
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}
          if-no-files-found: error
          retention-days: 1

  publish-container:
    needs: test
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v4
      - name: Set image name
        id: image
        env:
          REPOSITORY: ${{ github.repository }}
        run: echo "name=ghcr.io/${REPOSITORY,,}" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Generate image metadata
        id: metadata
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=semver,pattern=v{{version}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=raw,value=latest
      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          build-args: VERSION=${{ github.ref_name }}
      - name: Attest image provenance
        uses: actions/attest@v4
        with:
          subject-name: ${{ steps.image.outputs.name }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

  publish-release:
    needs:
      - build-binaries
      - publish-container
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: kubesqueeze_*
          merge-multiple: true
      - name: Generate checksums
        working-directory: dist
        run: sha256sum kubesqueeze_* > checksums.txt
      - name: Attest release assets
        uses: actions/attest@v4
        with:
          subject-path: dist/*
      - name: Create draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            if [[ "$(gh release view "$GITHUB_REF_NAME" --json isDraft --jq .isDraft)" != true ]]; then
              echo "Release $GITHUB_REF_NAME is already published." >&2
              exit 1
            fi
          else
            gh release create "$GITHUB_REF_NAME" \
              --draft \
              --generate-notes \
              --title "$GITHUB_REF_NAME" \
              --verify-tag
          fi
          gh release upload "$GITHUB_REF_NAME" dist/* --clobber
          gh release edit "$GITHUB_REF_NAME" --draft=false
