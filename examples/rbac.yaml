apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: kubesqueeze
  namespace: shop-staging
rules:
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets"]
    verbs: ["get", "list", "patch", "update"]
  - apiGroups: ["batch"]
    resources: ["cronjobs"]
    verbs: ["get", "list", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: kubesqueeze
  namespace: shop-staging
subjects:
  - kind: ServiceAccount
    name: kubesqueeze
    namespace: shop-staging
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: kubesqueeze
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kubesqueeze
  namespace: shop-staging
